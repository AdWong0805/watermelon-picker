name: guashu
description: "瓜熟 — 用敲击声检测西瓜成熟度（跨平台 Android/iOS）"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 音频录制（跨平台）。6.x 家族版本一致，修掉 record_linux 接口不匹配
  record: ^6.0.0
  # 文件路径
  path_provider: ^2.1.5
  # FFT / 信号处理
  fftea: ^1.5.0+1
  # 导出采集数据（分享 zip）
  share_plus: ^10.1.3
  archive: ^3.6.1
  # 回听采集录音
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
